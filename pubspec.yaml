name: admin_enroute
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  qr_flutter: ^4.1.0
  image_picker: ^1.1.0        # for picking images/files
  firebase_storage: 13.1.0    # for uploading and retrieving files
  path_provider: ^2.0.15       # optional, if saving temp files
  supabase_flutter: ^1.10.0
  firebase_database: ^12.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/misd.png
    - assets/cvo.png
    - assets/cenro.png
    - assets/cafo.png
    - assets/ocps.png
    - assets/ceo.png
    - assets/cswd.png
    - assets/cho.png
    - assets/sp.png
    - assets/logo.png
    - assets/ocm.png
    - assets/socd.png
    - assets/ustplogo.jpg
    - assets/peso.png